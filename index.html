
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>

    <!-- CSS -->
   <link rel="stylesheet" href="stylesheet.css">


   <!-- Boxicons css-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' 
    rel='stylesheet'
    />

</head>
<body>
   <div class="profile-card">
   <div class="image">
    <img src="profile.jpg" alt="" class="profile-img">
   </div>
   <div class="text-data">
    <span class="name">Dina Samy</span>
    <span class="job">Information Systems Student | Full Stack Developer</span>

   </div>
   <div class="media-buttons">
    <a href="https://www.facebook.com/share/1Xb4odEYtj/" target="_blank" style="background: #4267b2;" class="link">
        <i class='bx bxl-facebook' ></i>
    </a>
    <a href="https://www.linkedin.com/in/dina-samy-is" target="_blank" style="background: #0A66c2;" class="link">

       <i class='bx bxl-linkedin'></i> 
   </a>
   <a href="https://github.com/dony251" target="_blank" style="background: #333;" class="link">
    <i class='bx bxl-github'></i>
</a>

   <a href="https://wa.me/201143915266" target="_blank" style="background: #25D366;" class="link">
        <i class='bx bxl-whatsapp'></i>
    </a>
    <a href="https://t.me/Dina_samy" target="_blank" style="background: #0088cc;" class="link">
        <i class='bx bxl-telegram'></i>
    </a>
    
   </div>
   <div class="buttons">
    <button class="button"
        onclick="window.open('https://www.linkedin.com/in/dina-samy-is','_blank')">
        Subscribe
    </button>

    <button class="button"
        onclick="window.open('https://wa.me/201143915266','_blank')">
        Message
    </button>
</div>

   <div class="analytics">
    <div class="data">
        <i class='bx bx-heart'></i>
        <span class="number">60K</span>
    </div>
  

   
    <div class="data">
        <i class='bx bx-message-rounded'></i>
        <span class="number">20K</span>
    </div>
  

  
    <div class="data">
        <i class='bx bx-share' ></i>
        <span class="number">12K</span>
    </div>
   </div>
   </div>
        
    
</body>
</html>
